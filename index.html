<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S — Just A Rather Very Intelligent System</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Animated background particles -->
  <div class="bg-grid"></div>
  <div class="particles" id="particles"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">SYSTEM ONLINE</span>
    </div>
    <div class="topbar-center">
      <span class="logo">J.A.R.V.I.S</span>
    </div>
    <div class="topbar-right">
      <span id="clockDisplay" class="clock"></span>
    </div>
  </header>

  <!-- Main Container -->
  <main class="main-container">

    <!-- AI Core Visualizer -->
    <div class="core-section">
      <div class="core-ring outer-ring"></div>
      <div class="core-ring mid-ring"></div>
      <div class="core-ring inner-ring"></div>
      <div class="arc-reactor" id="arcReactor">
        <div class="arc-inner">
          <svg viewBox="0 0 100 100" class="arc-svg">
            <circle cx="50" cy="50" r="45" class="arc-track"/>
            <circle cx="50" cy="50" r="45" class="arc-progress" id="arcProgress"/>
          </svg>
          <div class="arc-center">
            <div class="arc-logo">J</div>
          </div>
        </div>
      </div>
      <!-- Waveform bars around the reactor -->
      <div class="waveform" id="waveform">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- State Label -->
    <div class="state-label" id="stateLabel">
      <span class="state-icon">◉</span>
      <span id="stateLabelText">STANDBY</span>
    </div>

    <!-- Transcript Display -->
    <div class="transcript-box">
      <div class="transcript-header">
        <span class="t-icon">▸</span> YOU SAID
      </div>
      <div class="transcript-text" id="transcriptText">
        Press the button below or say <em>"Hey Jarvis"</em> to begin...
      </div>
    </div>

    <!-- Response Display -->
    <div class="response-box" id="responseBox">
      <div class="response-header">
        <span class="t-icon">▸</span> JARVIS SAYS
      </div>
      <div class="response-text" id="responseText">
        Awaiting your command, sir.
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn secondary-btn" id="stopBtn" title="Stop Speaking">
        <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
      <button class="ctrl-btn primary-btn" id="listenBtn" title="Speak to Jarvis">
        <svg viewBox="0 0 24 24">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="ctrl-btn secondary-btn" id="clearBtn" title="Clear History">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>

    <!-- API inputs hidden — key is hardcoded in script.js -->
    <input type="hidden" id="apiKeyInput" />
    <button id="saveApiBtn" style="display:none"></button>

    <!-- Command Chips -->
    <div class="command-chips">
      <div class="chip-label">QUICK COMMANDS</div>
      <div class="chips-row">
        <button class="chip" data-cmd="What time is it?">⏰ Time</button>
        <button class="chip" data-cmd="What's today's date?">📅 Date</button>
        <button class="chip" data-cmd="Open YouTube">▶ YouTube</button>
        <button class="chip" data-cmd="Open Google">🔍 Google</button>
        <button class="chip" data-cmd="Tell me a joke">😄 Joke</button>
        <button class="chip" data-cmd="What can you do?">🤖 Help</button>
      </div>
    </div>

    <!-- Conversation History -->
    <div class="history-section">
      <div class="history-header">
        <span class="t-icon">▸</span> SESSION LOG
        <span class="history-count" id="historyCount">0 entries</span>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No conversation yet. Start talking!</div>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
